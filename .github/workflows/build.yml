name: Build Justin OS Live ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-24.04

    steps:
      # =========================
      # Checkout
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # Install dependencies
      # =========================
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build \
            debootstrap \
            xorriso \
            squashfs-tools \
            grub-pc-bin \
            grub-efi-amd64-bin \
            plymouth \
            plymouth-themes \
            debian-archive-keyring

      # =========================
      # Clean previous builds
      # =========================
      - name: Clean live-build
        run: |
          sudo lb clean --purge || true

      # =========================
      # Configure live-build (FIXED EVERYTHING)
      # =========================
      - name: Configure live-build
        run: |
          # 💥 kill all broken apt sources (VERY IMPORTANT)
          sudo rm -f /etc/apt/sources.list || true
          sudo rm -f /etc/apt/sources.list.d/*.list || true

          # 💥 configure live-build cleanly
          sudo lb config \
            --mode debian \
            --distribution bookworm \
            --archive-areas "main contrib non-free-firmware" \
            --mirror-bootstrap http://deb.debian.org/debian \
            --mirror-chroot http://deb.debian.org/debian \
            --security-mirror http://deb.debian.org/debian-security \
            --binary-images iso-hybrid \
            --apt-recommends false \
            --apt-secure true

      # =========================
      # Build ISO
      # =========================
      - name: Build ISO
        run: |
          sudo lb build

      # =========================
      # Verify output
      # =========================
      - name: List generated files
        run: |
          echo "ISO output:"
          find . -maxdepth 2 -type f -name "*.iso" || true
          ls -lah || true

      # =========================
      # Upload artifact (FIXED)
      # =========================
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: justin-os-live-iso
          path: "*.iso"
          if-no-files-found: error
