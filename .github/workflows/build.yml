name: Build Justin OS (Ultimate Stable)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🧼 1. 安裝環境（乾淨）
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build debootstrap xorriso squashfs-tools \
            grub-pc-bin grub-efi-amd64-bin \
            plymouth plymouth-themes systemd-container

      # 🧼 2. 絕對不碰 apt sources（關鍵）
      - name: Clean build environment
        run: |
          sudo lb clean --purge || true
          rm -rf config/chroot config/binary config/bootstrap || true

      # ⚙️ 3. live-build（完全交給 LB 管 APT）
      - name: Configure live-build
        run: |
          lb config \
            --mode debian \
            --distribution bookworm \
            --archive-areas "main contrib non-free-firmware" \
            --mirror-bootstrap http://deb.debian.org/debian \
            --mirror-chroot http://deb.debian.org/debian \
            --binary-images iso-hybrid \
            --apt-recommends false \
            --apt-secure true \
            --apt-indices false

      # 🔥 4. build
      - name: Build ISO
        run: |
          sudo lb build

      # 📦 5. output check
      - name: List ISO
        run: |
          ls -lh *.iso || true

      # 📤 6. upload artifact
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: justin-os-ultimate
          path: "*.iso"
          if-no-files-found: error
