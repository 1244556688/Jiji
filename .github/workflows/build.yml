name: Build Justin OS Live ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-iso:
    name: Build Justin OS Debian Live ISO
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # Install dependencies
      # =========================
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build \
            debootstrap \
            xorriso \
            squashfs-tools \
            grub-pc-bin \
            grub-efi-amd64-bin \
            plymouth \
            plymouth-themes \
            debian-archive-keyring

      # =========================
      # Clean previous build
      # =========================
      - name: Clean live-build
        run: |
          sudo lb clean --purge || true

      # =========================
      # Configure live-build (FIXED)
      # =========================
      - name: Configure live-build
        run: |
          sudo rm -f /etc/apt/sources.list
          sudo rm -f /etc/apt/sources.list.d/*.list || true
          
          sudo lb config \
            --mode debian \
            --distribution bookworm \
            --archive-areas "main contrib non-free-firmware" \
            --mirror-bootstrap http://deb.debian.org/debian \
            --mirror-chroot http://deb.debian.org/debian \
            --binary-images iso-hybrid \
            --apt-recommends false \
            --apt-secure true

      # =========================
      # Build ISO
      # =========================
      - name: Build ISO
        run: |
          sudo lb build

      # =========================
      # Check output
      # =========================
      - name: List output files
        run: |
          echo "Generated files:"
          ls -lah || true
          find . -maxdepth 2 -type f -name "*.iso" || true

      # =========================
      # Upload ISO artifact (FIXED)
      # =========================
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: justin-os-live-iso
          path: "*.iso"
          if-no-files-found: error
